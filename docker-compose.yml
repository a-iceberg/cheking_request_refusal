version: '3.8'

services:
  refusal_check:
    container_name: refusal_check
    network_mode: host
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - TZ=Europe/Moscow
    volumes:
      - ./data:/app/data
      - /etc/letsencrypt/live/ml.icecorp.ru/fullchain.pem:/app/data/ssl_cert.pem
      - /etc/letsencrypt/live/ml.icecorp.ru/privkey.pem:/app/data/ssl_pkey.pem
    command: ["gunicorn", "refusal_check:app", "--workers", "1", "--worker-class", "uvicorn.workers.UvicornWorker", "--bind", "0.0.0.0:8500", "--timeout", "600", "--keyfile", "./data/ssl_pkey.pem", "--certfile", "./data/ssl_cert.pem"]