version: '3.8'

services:
  refusal_check:
    container_name: refusal_check
    network_mode: host
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - TZ=Europe/Moscow
    volumes:
      - ./data:/app/data
    command: ["gunicorn", "refusal_check:app", "--workers", "1", "--worker-class", "uvicorn.workers.UvicornWorker", "--bind", "0.0.0.0:8500", "--timeout", "1800"]